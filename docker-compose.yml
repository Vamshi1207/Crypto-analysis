services:
  python_server:
    build:
      context: ./python_server
    container_name: crypto-analysis-python-server
    ports:
      - "${HOST_PORT:-5050}:${CONTAINER_PORT:-5000}"
      - "${DATASET_PREP_DASHBOARD_HOST_PORT:-8765}:${DATASET_PREP_DASHBOARD_CONTAINER_PORT:-8765}"
    environment:
      HOST: 0.0.0.0
      PORT: ${CONTAINER_PORT:-5000}
      DATA_DIR: /app/data
    volumes:
      - ./python_server:/app
      - ./python_server/data:/app/data
    working_dir: /app
    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true
    restart: unless-stopped

  jupyter:
    build:
      context: ./python_server
    container_name: crypto-analysis-jupyter
    profiles: ["jupyter"]
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./python_server:/app
      - ./python_server/data:/app/data
    working_dir: /app
    command: ["jupyter", "notebook", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--ServerApp.token=", "--ServerApp.password=", "--NotebookApp.token=", "--NotebookApp.password="]
    stdin_open: true
    tty: true
    restart: unless-stopped
