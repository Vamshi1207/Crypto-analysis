<!doctype html>
<html>
<head>
  <title>Live Token Dashboard</title>
	<style>
	  body {
		font-family: sans-serif;
		padding: 20px;
	  }
	  table {
		border-collapse: collapse;
		width: 100%;
		table-layout: fixed; /* ✅ Prevent column resizing */
		margin-top: 20px;
	  }
	  th, td {
		border: 1px solid #ccc;
		padding: 8px 12px;
		text-align: left;
		vertical-align: top;
		word-wrap: break-word;
		word-break: break-word;
		overflow-wrap: break-word;
	  }
	  th {
		background-color: #f0f0f0;
	  }

	  /* ✅ Set fixed width per column */
	  th:nth-child(1), td:nth-child(1) { width: 100px; }  /* Token */
	  th:nth-child(2), td:nth-child(2) { width: 260px; }  /* Analysis */
	  th:nth-child(3), td:nth-child(3) { width: 200px; }  /* Price */
	  th:nth-child(4), td:nth-child(4) { width: 200px; }  /* Momentum */
	  th:nth-child(5), td:nth-child(5) { width: 200px; }  /* Trend */
	  th:nth-child(6), td:nth-child(6) { width: 200px; }  /* Volatility */

	  a {
		color: #1a73e8;
		text-decoration: none;
	  }
	  a:hover {
		text-decoration: underline;
	  }

	  td.token-name {
		white-space: normal !important;
	  }

	  td.metrics {
		white-space: pre-wrap;
		font-family: monospace;
		font-size: 14px;
	  }
	</style>

</head>
<body>
  <h2>📊 Live Token Indicator Dashboard</h2>
  <table>
    <thead>
      <tr>
        <th>🪙 Token</th>
        <th>🧠 Analysis</th>
        <th>📊 Price & Volume</th>
        <th>⚡ Momentum</th>
        <th>📈 Trend</th>
        <th>🌊 Volatility</th>
      </tr>
    </thead>
    <tbody id="tokenTable"></tbody>
  </table>

  <script>
  const timeframes = ["1S", "5S", "15S", "30S", "1", "3", "5"];
  const selectedTF = {};

	async function refresh() {
	  for (const addr in selectedTF) {
		const tf = selectedTF[addr] || "1S";
		const res = await fetch(`/data?tf=${tf}`);
		const allTokens = await res.json();
		const token = allTokens[addr];
		if (!token) continue;

		const {
		  name, rsi, ema200, macd_line, macd_signal, macd_hist,
		  stoch_k, stoch_d, vwap, adx, plus_di, minus_di,
		  boll_upper, boll_middle, boll_lower, open, high, low, close, volume, timestamp,
		  analysis, error
		} = token;

		const format = (label, val) => `${label}: ${val !== null && val !== undefined ? val : 'N/A'}`;

		const priceCol = [
		  format('🟢 Open', open),
		  format('🔺 High', high),
		  format('🔻 Low', low),
		  format('⚪ Close', close),
		  format('💰 Volume', volume),
		  format('⏱️ Time', timestamp)
		].join('\n');

		const momentumCol = [
		  format('📊 RSI (14)', rsi),
		  format('🟣 MACD', macd_line),
		  format('🔵 Signal', macd_signal),
		  format('📊 Histogram', macd_hist),
		  format('⚡ %K', stoch_k),
		  format('⚡ %D', stoch_d)
		].join('\n');

		const trendCol = [
		  format('📉 EMA 200', ema200),
		  format('💧 VWAP', vwap),
		  format('📐 ADX', adx),
		  `➕ +DI / ➖ -DI: ${plus_di ?? 'N/A'} / ${minus_di ?? 'N/A'}`
		].join('\n');

		const volatilityCol = [
		  format('🔺 Upper BB', boll_upper),
		  format('🔸 Mid BB', boll_middle),
		  format('🔻 Lower BB', boll_lower)
		].join('\n');

		let analysisCol = 'N/A';
		if (token.error) {
		  analysisCol = `❌ Error: ${token.error}\n\n${token.traceback}`;
		} else if (analysis) {
		  analysisCol = [
			`🧠 Summary: ${analysis.overall ?? 'N/A'}`,
			`🔁 ChoCH: ${analysis.choch ?? 'N/A'}`,
			format('📈 Trend', analysis.trend_strength),
			format('⚡ Momentum', analysis.momentum),
			format('🌊 Volatility', analysis.volatility),
			'',
			...(analysis.notes || []).map(n => `• ${n}`)
		  ].join('\n');
		}
      const rowId = `row-${addr}`;
      let row = document.getElementById(rowId);

      // Create row if it doesn't exist
      if (!row) {
        row = document.createElement('tr');
        row.id = rowId;

        const nameCell = document.createElement('td');
        nameCell.classList.add('token-name');
        const link = document.createElement('a');
        link.href = 'https://axiom.trade/meme/' + addr;
        link.target = '_blank';
        link.innerText = name;
        nameCell.appendChild(link);

        const select = document.createElement('select');
        for (const optionTF of timeframes) {
          const opt = document.createElement('option');
          opt.value = optionTF;
          opt.textContent = optionTF;
          if (optionTF === tf) opt.selected = true;
          select.appendChild(opt);
        }
        select.onchange = (e) => {
          selectedTF[addr] = e.target.value;
          refresh();
        };
        nameCell.appendChild(document.createElement('br'));
        nameCell.appendChild(select);

        const analysisCell = document.createElement('td');
        analysisCell.classList.add('metrics');

        const col1 = document.createElement('td');
        const col2 = document.createElement('td');
        const col3 = document.createElement('td');
        const col4 = document.createElement('td');
        [col1, col2, col3, col4].forEach(col => col.classList.add('metrics'));

        row.appendChild(nameCell);
        row.appendChild(analysisCell);
        row.appendChild(col1);
        row.appendChild(col2);
        row.appendChild(col3);
        row.appendChild(col4);

        document.getElementById('tokenTable').appendChild(row);
      }

      // Update values in-place
      const cells = row.children;
      cells[1].innerText = analysisCol;
      cells[2].innerText = priceCol;
      cells[3].innerText = momentumCol;
      cells[4].innerText = trendCol;
      cells[5].innerText = volatilityCol;
    }
  }

  fetch('/data?tf=1s').then(res => res.json()).then(data => {
    for (const addr in data) {
      if (!selectedTF[addr]) {
        selectedTF[addr] = "1s";
      }
    }
    refresh(); // ⏳ wait for tokens to be initialized
  });

  setInterval(refresh, 500);
</script>


</body>
</html>
